<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!--
    Maps Windows font names (used by VALID_FONTS / CAPTION_FONT_NAME) to
    the closest available Linux equivalents installed via Alpine packages:
      ttf-liberation      → Liberation Sans / Liberation Serif / Liberation Mono
      ttf-freefont        → FreeSans / FreeSerif / FreeMono
      ttf-linux-libertine → Linux Libertine O (serif) / Linux Biolinum O (humanist sans)
      ttf-dejavu          → DejaVu Sans / DejaVu Serif / DejaVu Sans Mono

    libass resolves fonts through fontconfig; these aliases ensure a named font
    is found even when the exact Windows typeface is not installed.
  -->

  <alias>
    <family>Arial</family>
    <prefer><family>Liberation Sans</family></prefer>
    <default><family>sans-serif</family></default>
  </alias>

  <alias>
    <family>Arial Black</family>
    <prefer><family>Liberation Sans</family></prefer>
    <default><family>sans-serif</family></default>
  </alias>

  <alias>
    <family>Bahnschrift</family>
    <prefer><family>Liberation Sans</family></prefer>
    <default><family>sans-serif</family></default>
  </alias>

  <alias>
    <family>Calibri</family>
    <prefer><family>Linux Biolinum</family></prefer>
    <default><family>sans-serif</family></default>
  </alias>

  <alias>
    <family>Candara</family>
    <prefer><family>Linux Biolinum</family></prefer>
    <default><family>sans-serif</family></default>
  </alias>

  <alias>
    <family>Comic Sans MS</family>
    <prefer><family>FreeSans</family></prefer>
    <default><family>sans-serif</family></default>
  </alias>

  <alias>
    <family>Consolas</family>
    <prefer><family>Liberation Mono</family></prefer>
    <default><family>monospace</family></default>
  </alias>

  <alias>
    <family>Courier New</family>
    <prefer><family>Liberation Mono</family></prefer>
    <default><family>monospace</family></default>
  </alias>

  <alias>
    <family>Georgia</family>
    <prefer><family>FreeSerif</family></prefer>
    <default><family>serif</family></default>
  </alias>

  <alias>
    <family>Impact</family>
    <prefer><family>FreeSans</family></prefer>
    <default><family>sans-serif</family></default>
  </alias>

  <alias>
    <family>Palatino Linotype</family>
    <prefer><family>Linux Libertine</family></prefer>
    <default><family>serif</family></default>
  </alias>

  <alias>
    <family>Segoe UI</family>
    <prefer><family>Linux Biolinum</family></prefer>
    <default><family>sans-serif</family></default>
  </alias>

  <alias>
    <family>Tahoma</family>
    <prefer><family>Liberation Sans</family></prefer>
    <default><family>sans-serif</family></default>
  </alias>

  <alias>
    <family>Times New Roman</family>
    <prefer><family>Liberation Serif</family></prefer>
    <default><family>serif</family></default>
  </alias>

  <alias>
    <family>Trebuchet MS</family>
    <prefer><family>FreeSans</family></prefer>
    <default><family>sans-serif</family></default>
  </alias>

  <alias>
    <family>Verdana</family>
    <prefer><family>DejaVu Sans</family></prefer>
    <default><family>sans-serif</family></default>
  </alias>
</fontconfig>
