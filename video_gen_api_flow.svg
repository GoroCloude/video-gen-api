<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Video generation API pipeline</title>
<desc>Flow from POST /generate through TTS, FFmpeg composition to MinIO upload</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: system-ui, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #3C3489; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }

  .c-gray rect  { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th   { fill: #444441; }
  .c-gray .ts   { fill: #5F5E5A; }

  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th  { fill: #3C3489; }
  .c-purple .ts  { fill: #534AB7; }

  .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th   { fill: #085041; }
  .c-teal .ts   { fill: #0F6E56; }

  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th  { fill: #712B13; }
  .c-coral .ts  { fill: #993C1D; }

  .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th   { fill: #0C447C; }
  .c-blue .ts   { fill: #185FA5; }

  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th  { fill: #633806; }
  .c-amber .ts  { fill: #854F0B; }
</style>

<!-- Client -->
<g class="c-gray">
  <rect x="40" y="30" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="52" text-anchor="middle" dominant-baseline="central">Client app</text>
  <text class="ts" x="110" y="70" text-anchor="middle" dominant-baseline="central">image + text</text>
</g>

<!-- Arrow to API -->
<line x1="180" y1="58" x2="240" y2="58" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="210" y="50" text-anchor="middle">POST</text>

<!-- Express API -->
<g class="c-purple">
  <rect x="240" y="30" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="320" y="52" text-anchor="middle" dominant-baseline="central">Express API</text>
  <text class="ts" x="320" y="70" text-anchor="middle" dominant-baseline="central">POST /generate</text>
</g>

<!-- Arrow down to TTS row -->
<line x1="320" y1="86" x2="320" y2="150" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="130" dominant-baseline="central">1. TTS</text>

<!-- ElevenLabs -->
<g class="c-teal">
  <rect x="100" y="150" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="170" y="172" text-anchor="middle" dominant-baseline="central">ElevenLabs</text>
  <text class="ts" x="170" y="190" text-anchor="middle" dominant-baseline="central">Primary TTS</text>
</g>

<!-- Google TTS -->
<g class="c-teal">
  <rect x="280" y="150" width="140" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="350" y="172" text-anchor="middle" dominant-baseline="central">Google TTS</text>
  <text class="ts" x="350" y="190" text-anchor="middle" dominant-baseline="central">Fallback TTS</text>
</g>

<!-- Arrows from API to TTS providers -->
<line x1="290" y1="110" x2="200" y2="150" class="arr" marker-end="url(#arrow)"/>
<line x1="330" y1="110" x2="350" y2="150" class="arr" marker-end="url(#arrow)"/>

<!-- Arrows TTS down to FFmpeg -->
<line x1="230" y1="206" x2="280" y2="270" class="arr" marker-end="url(#arrow)"/>
<line x1="370" y1="206" x2="330" y2="270" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="430" y="248" dominant-baseline="central">2. Compose</text>

<!-- FFmpeg -->
<g class="c-coral">
  <rect x="200" y="270" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="320" y="292" text-anchor="middle" dominant-baseline="central">FFmpeg</text>
  <text class="ts" x="320" y="310" text-anchor="middle" dominant-baseline="central">image + audio + captions</text>
</g>

<!-- Arrow FFmpeg down to MinIO -->
<line x1="320" y1="326" x2="320" y2="390" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="370" dominant-baseline="central">3. Upload</text>

<!-- MinIO -->
<g class="c-blue">
  <rect x="200" y="390" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="320" y="412" text-anchor="middle" dominant-baseline="central">MinIO (shumov.eu)</text>
  <text class="ts" x="320" y="430" text-anchor="middle" dominant-baseline="central">S3-compatible store</text>
</g>

<!-- Arrow MinIO to response -->
<line x1="440" y1="418" x2="540" y2="418" class="arr" marker-end="url(#arrow)"/>

<!-- Response -->
<g class="c-gray">
  <rect x="540" y="390" width="100" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="590" y="412" text-anchor="middle" dominant-baseline="central">Response</text>
  <text class="ts" x="590" y="430" text-anchor="middle" dominant-baseline="central">{ url, duration }</text>
</g>

<!-- SRT captions note -->
<g class="c-amber">
  <rect x="480" y="270" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="292" text-anchor="middle" dominant-baseline="central">SRT captions</text>
  <text class="ts" x="560" y="310" text-anchor="middle" dominant-baseline="central">burned in via FFmpeg</text>
</g>
<line x1="480" y1="298" x2="440" y2="298" class="arr" marker-end="url(#arrow)"/>
</svg>
